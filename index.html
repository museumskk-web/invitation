<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소중한 분들을 초대합니다</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .invitation-card {
            background-color: #ffffff;
            width: 90%;
            max-width: 450px;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #eee;
        }
        .header {
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .title {
            font-size: 2.5rem;
            color: #2c3e50;
            margin: 10px 0;
            font-family: 'Georgia', serif;
        }
        .divider {
            width: 50px;
            height: 2px;
            background-color: #d4af37;
            margin: 20px auto;
        }
        .content {
            line-height: 1.8;
            margin: 30px 0;
            font-size: 1.05rem;
        }
        .info-box {
            background-color: #fcfcfc;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }
        .info-item {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        .label {
            font-weight: bold;
            color: #d4af37;
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background-color: #2c3e50;
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #444;
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <div class="header">INVITATION</div>
        <h1 class="title">초대합니다</h1>
        <div class="divider"></div>
        
        <div class="content">
            함께하면 즐거운 시간이 될 것 같습니다.<br>
            귀한 걸음 하시어 자리를 빛내주시면<br>
            더 없는 기쁨으로 맞이하겠습니다.
        </div>

        <div class="info-box">
            <div class="info-item">
                <span class="label">일시</span>
                <span>2026년 5월 23일 (토) 오후 2시</span>
            </div>
            <div class="info-item">
                <span class="label">장소</span>
                <span>서울 가든 호텔 2층 연회장</span>
            </div>
            <div class="info-item">
                <span class="label">문의</span>
                <span>010-1234-5678</span>
            </div>
        </div>

        <a href="#" class="btn" onclick="alert('지도가 곧 연결됩니다!')">오시는 길 확인</a>
    </div>

</body>
</html>
