<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>museumdesign Open Invitation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background-color: #ffffff;
            padding: 60px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 8px solid #000;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
            display: inline-block;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }
        h1 {
            font-size: 28px;
            font-weight: 300;
            line-height: 1.4;
            margin-bottom: 30px;
        }
        .accent {
            font-weight: 700;
            color: #000;
        }
        .content {
            font-size: 15px;
            line-height: 1.8;
            color: #666;
            margin-bottom: 40px;
        }
        .info-box {
            background-color: #fafafa;
            padding: 30px;
            text-align: left;
            margin-bottom: 40px;
        }
        .info-item {
            margin-bottom: 15px;
            font-size: 14px;
        }
        .info-label {
            display: inline-block;
            width: 60px;
            font-weight: 700;
            color: #000;
        }
        .footer {
            font-size: 12px;
            color: #aaa;
            letter-spacing: 1px;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">museumdesign</div>
    
    <h1>새로운 영감이 시작되는 곳,<br><span class="accent">그 문을 함께 열어주세요.</span></h1>
    
    <p class="content">
        일상을 예술로 바꾸는 디자인의 힘을 믿습니다.<br>
        오랜 준비 끝에 <strong>museumdesign</strong>이 <br>
        첫 번째 공간을 마련하고 여러분을 초대합니다.
    </p>

    <div class="info-box">
        <div class="info-item">
            <span class="info-label">DATE</span> 2026. 05. 20 (Wed) PM 04:00
        </div>
        <div class="info-item">
            <span class="info-label">PLACE</span> 서울특별시 강남구 디자인대로 123, 5F
        </div>
        <div class="info-item">
            <span class="info-label">RSVP</span> 02-1234-5678 (5월 15일까지)
        </div>
    </div>

    <a href="#" class="btn">오시는 길 확인하기</a>

    <div style="margin-top: 60px;">
        <p class="footer">© 2026 museumdesign. ALL RIGHTS RESERVED.</p>
    </div>
</div>

</body>
</html>
